name: Release Build

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve release tag
        id: vars
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "failed to resolve release tag"
            exit 1
          fi

          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag must match vX.Y.Z"
            exit 1
          fi

          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must match X.Y.Z"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump Cargo.toml version
        run: |
          set -e
          VERSION="${{ steps.vars.outputs.version }}"
          sed -i '0,/^version = ".*"/s//version = "'"$VERSION"'"/' Cargo.toml

      - name: Commit version sync
        run: |
          set -e
          VERSION="${{ steps.vars.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml
          if git diff --cached --quiet; then
            echo "No Cargo.toml changes to commit"
          else
            git commit -m "release: bump version to $VERSION"

            # Fetch latest and rebase to handle concurrent pushes
            git fetch origin "${{ github.event.repository.default_branch }}"
            git rebase "origin/${{ github.event.repository.default_branch }}"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi

  build-release:
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp target/release/feathertail dist/feathertail-linux-amd64

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          generate_release_notes: true
          files: dist/feathertail-linux-amd64
